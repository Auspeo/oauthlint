<div style="min-height:100vh; display:flex; flex-direction:column; background-color:var(--ol-canvas); background-image:linear-gradient(to right, var(--ol-grid-line) 1px, transparent 1px), linear-gradient(to bottom, var(--ol-grid-line) 1px, transparent 1px); background-size:32px 32px;">
  <nav style="display:flex; align-items:center; gap:var(--ol-space-6); padding:0 var(--ol-space-6); height:56px; border-bottom:1px solid var(--ol-border);">
    <a href="/" style="display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--ol-text);" aria-label="OAuthLint home">
      <svg width="24" height="24" viewBox="0 0 64 64" fill="none" aria-hidden="true"><rect x="13" y="11" width="38" height="27" stroke="var(--ol-accent)" stroke-width="5"/><path d="M11 50c3-5 6-5 9 0s6 5 9 0 6-5 9 0 6 5 9 0" stroke="var(--ol-sev-critical)" stroke-width="5" stroke-linecap="round"/></svg>
      <span style="font-family:var(--ol-font-display); font-weight:700; font-size: 16px; letter-spacing:-0.02em;">OAuthLint</span>
    </a>
    <div style="flex:1;"></div>
    <button type="button" data-theme-toggle aria-label="Toggle colour theme" style="display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; padding:0; background:var(--ol-surface); border:1px solid var(--ol-border-strong); color:var(--ol-text-secondary); cursor:pointer; transition:border-color var(--ol-dur-fast) var(--ol-ease-standard);" style-hover="border-color:var(--ol-accent-border); color:var(--ol-text);"><span data-theme-icon aria-hidden="true" style="font-family:var(--ol-font-mono); font-size: 15px; line-height:1;">◐</span></button>
  </nav>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:var(--ol-space-12) var(--ol-space-6);">
    <div style="font-family:var(--ol-font-display); font-weight:700; font-size:clamp(4rem, 14vw, 7rem); letter-spacing:-0.04em; line-height:1; margin-bottom:var(--ol-space-5); color:var(--ol-text);">404</div>
    <h1 style="font-family:var(--ol-font-display); font-weight:600; font-size:var(--ol-text-display-m); letter-spacing:-0.02em; margin:0 0 var(--ol-space-3);">No match found.</h1>
    <p style="font-size:var(--ol-text-body-l); line-height:var(--ol-leading-relaxed); color:var(--ol-text-secondary); max-width:46ch; margin:0 0 var(--ol-space-8);">We scanned for that page and came back clean — which, ironically, is the one time a zero-result scan is bad news.</p>

    <div style="background:var(--ol-canvas); border:1px solid var(--ol-border-strong); padding:var(--ol-space-4) var(--ol-space-5); font-family:var(--ol-font-mono); font-size:var(--ol-text-code); line-height:1.9; text-align:left; max-width:420px; width:100%; margin-bottom:var(--ol-space-8);">
      <div><span style="color:var(--ol-accent);">$</span> oauthlint open <span style="color:var(--ol-text-muted);">$REQUESTED_PAGE</span></div>
      <div><span style="color:var(--ol-sev-info);">●</span> <span style="color:var(--ol-text-secondary);">info</span> <span style="color:var(--ol-text-faint);">route resolved 0 matches</span></div>
      <div><span style="color:var(--ol-accent);">$</span> <span style="display:inline-block; width:8px; height:14px; background:var(--ol-accent); vertical-align:-2px; animation:ol-blink 1.1s steps(1) infinite;"></span></div>
    </div>

    <div style="display:flex; flex-wrap:wrap; gap:var(--ol-space-3); justify-content:center;">
      <a href="/" style="display:inline-flex; align-items:center; gap:8px; font-family:var(--ol-font-ui); font-weight:600; font-size: 15px; color:var(--ol-accent-fg); background:var(--ol-accent); height:42px; padding:0 20px; text-decoration:none;" style-hover="background:var(--ol-accent-hover);">← Back home</a>
      <a href="/docs" style="display:inline-flex; align-items:center; gap:8px; font-family:var(--ol-font-mono); font-weight:500; font-size: 15px; color:var(--ol-text-secondary); background:transparent; border:1px solid var(--ol-border-strong); height:42px; padding:0 18px; text-decoration:none;" style-hover="border-color:var(--ol-accent-border); color:var(--ol-text);">Read the docs</a>
    </div>
  </div>

  <footer style="border-top:1px solid var(--ol-border);">
    <div style="max-width:1120px; margin:0 auto; padding:var(--ol-space-5) var(--ol-space-6); text-align:center;">
      <span style="font-family:var(--ol-font-mono); font-size: 12.5px; color:var(--ol-text-faint);">© 2026 Auspeo</span>
    </div>
  </footer>
</div>
