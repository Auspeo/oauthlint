name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate PR commits
        run: >-
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Semgrep
        run: pipx install semgrep==1.163.0

      - name: Test
        run: pnpm test:run

  dogfood:
    name: OAuthLint scans its own vulnerable example
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - name: Install Semgrep
        run: pipx install semgrep==1.163.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Scan vulnerable example (≥ 6 distinct rules + canonical demo bugs)
        run: |
          set +e
          node cli/bin/oauthlint.js scan ./examples/vibe-app-express --json --fail-on off > /tmp/oauthlint-report.json
          set -e
          DISTINCT=$(jq '[.findings[].ruleId] | unique | length' /tmp/oauthlint-report.json)
          echo "distinct rules: $DISTINCT"
          jq '[.findings[].ruleId] | unique' /tmp/oauthlint-report.json
          if [ "$DISTINCT" -lt 6 ]; then
            echo "::error::Expected at least 6 distinct rules, got $DISTINCT"
            exit 1
          fi
          for must in auth.jwt.alg-none auth.oauth.hardcoded-secret auth.oauth.wildcard-redirect; do
            if ! jq -e --arg id "$must" '[.findings[].ruleId] | index($id)' /tmp/oauthlint-report.json > /dev/null; then
              echo "::error::Expected canonical rule $must to fire"
              exit 1
            fi
          done

  action-smoke:
    name: Root Marketplace action runs end-to-end (composite -> Docker delegation)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      # Proves the Marketplace-facing root `action.yml` (a composite that
      # delegates to ./action) executes through to the Docker action and
      # produces SARIF. fail-on: off so a finding can't fail this smoke test —
      # we only assert the path runs end-to-end.
      - id: oauthlint
        uses: ./
        with:
          path: ./examples/vibe-app-express
          sarif: 'true'
          sarif-file: oauthlint.sarif
          fail-on: 'off'

      - name: Assert the root action produced a SARIF report with findings
        run: |
          SARIF="${{ steps.oauthlint.outputs.sarif-file }}"
          echo "sarif-file output: $SARIF"
          test -n "$SARIF" || { echo "::error::root action did not set sarif-file output"; exit 1; }
          test -f "$SARIF" || { echo "::error::SARIF report $SARIF was not written"; exit 1; }
          RESULTS=$(jq '[.runs[].results[]] | length' "$SARIF")
          echo "SARIF results: $RESULTS"
          test "$RESULTS" -gt 0 || { echo "::error::expected the vulnerable example to yield SARIF findings"; exit 1; }
