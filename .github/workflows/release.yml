name: Release

# Changesets-driven npm release. With pending changesets it opens/updates a
# "Version Packages" PR; when that PR is merged it publishes the bumped packages
# to npm. Dormant until both a changeset and the NPM_TOKEN secret exist, so it is
# safe to leave enabled. (Marketplace artifacts — the Action and the VS Code
# extension — are published manually; see RELEASE.md.)

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version / publish (Changesets)
    runs-on: ubuntu-latest
    # Disabled until publishing is set up. Enable by adding the repo VARIABLE
    # NPM_PUBLISH=enabled and the SECRET NPM_TOKEN. Until then the job is
    # skipped (the run stays green) instead of failing on an auth-less publish.
    if: ${{ vars.NPM_PUBLISH == 'enabled' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'release: version packages'
          title: 'release: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
