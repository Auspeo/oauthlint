name: Release

# Changesets-driven npm release. With pending changesets it opens/updates a
# "Version Packages" PR; when that PR is merged it publishes the bumped packages
# to npm. Dormant until both a changeset and the NPM_TOKEN secret exist, so it is
# safe to leave enabled. (Marketplace artifacts — the Action and the VS Code
# extension — are published manually; see RELEASE.md.)

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version / publish (Changesets)
    runs-on: ubuntu-latest
    # Disabled until publishing is set up. Enable by adding the repo VARIABLE
    # NPM_PUBLISH=enabled and the SECRET NPM_TOKEN. Until then the job is
    # skipped (the run stays green) instead of failing on an auth-less publish.
    if: ${{ vars.NPM_PUBLISH == 'enabled' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.26.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Create release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'release: version packages'
          title: 'release: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
