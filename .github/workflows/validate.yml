name: Real-world validation

# Real-world false-positive corpus scan. `pnpm validate` shallow-clones ~15
# repos and scans each with the rule pack, so it is far too slow + network-heavy
# to run on every PR. Instead it runs on a weekly schedule (and on demand) as a
# regular FP-regression signal. It is informational: findings are surfaced in the
# step summary and as an artifact rather than failing the build.
on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Scan real-world corpus for false positives
    runs-on: ubuntu-latest
    # Cloning + scanning ~15 repos is slow; give it generous headroom but cap it.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 10.26.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: pnpm
      - name: Install Semgrep
        run: pipx install semgrep==1.163.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Run real-world validation
        run: pnpm validate
      - name: Publish report to step summary
        if: always()
        run: |
          if [ -f validation-report.md ]; then
            cat validation-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No validation-report.md was produced." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validation-report
          path: |
            validation-report.md
            validation-report.json
          if-no-files-found: warn
