name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'rules/rules/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Single in-flight deployment; don't cancel a running one (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build site (Astro)
        run: pnpm --filter oauthlint-site build
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 pages deploy site/dist --project-name=oauthlint --branch=main --commit-dirty=true
