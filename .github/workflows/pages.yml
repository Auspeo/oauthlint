name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'rules/rules/**'
      - 'scripts/generate-rule-docs.ts'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Single in-flight deployment; don't cancel a running one (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build docs site (VitePress)
        run: pnpm docs:build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=oauthlint --branch=main
