name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'rules/rules/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Single in-flight deployment; don't cancel a running one (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

# Deploys to Cloudflare Pages via wrangler (API-token auth), not GitHub Pages,
# so the job only needs to read the repo.
permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.26.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build site (Astro)
        # `...` builds oauthlint-site AND its workspace deps (oauthlint-rules) in
        # topological order, so the prebuild Semgrep-config generator can import
        # the built rules loader.
        env:
          # Cloudflare Web Analytics beacon token. The site is built HERE (not on
          # Cloudflare) and uploaded to Pages via wrangler, and the domain's DNS
          # zone is not on this Cloudflare account, so automatic edge injection
          # does not apply and the token must be inlined at build time. It is
          # public (it ships in the HTML), hence a repo variable, not a secret.
          PUBLIC_CF_BEACON_TOKEN: ${{ vars.PUBLIC_CF_BEACON_TOKEN || secrets.PUBLIC_CF_BEACON_TOKEN }}
        run: pnpm --filter "oauthlint-site..." build
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 pages deploy site/dist --project-name=oauthlint --branch=main --commit-dirty=true
