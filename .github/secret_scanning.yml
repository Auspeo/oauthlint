# Exclude deliberately-vulnerable fixtures, example apps, and the docs site
# from secret scanning and push protection. These paths intentionally
# contain secret-SHAPED test data (e.g. `sk_live_…`, Slack tokens) used to
# exercise oauthlint's own secret-detection rules — they are NOT real
# credentials. Real secrets anywhere else in the repo are still scanned.
paths-ignore:
  - "rules/tests/fixtures/**"
  - "examples/**"
  - "site/**"
