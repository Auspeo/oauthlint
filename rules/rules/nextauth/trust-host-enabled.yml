rules:
  - id: auth.nextauth.trust-host-enabled
    languages:
      - javascript
      - typescript
    severity: WARNING
    message: |
      The NextAuth/Auth.js config hard-codes `trustHost: true`.

      This tells Auth.js to trust the incoming `Host` / `X-Forwarded-Host`
      header when it builds callback, sign-in, and verification URLs. If a
      request can reach your app with an attacker-chosen host header, that turns
      into host-header injection: poisoned password-reset and magic links, and
      redirects to attacker origins. Only enable it behind a proxy you control
      that strips untrusted host headers, and gate it on an environment variable
      such as `trustHost: process.env.AUTH_TRUST_HOST === 'true'` instead of a
      hard-coded `true`.
    # Anchored to a NextAuth/Auth.js config object so a `trustHost: true` on an
    # unrelated object never fires. We match only the literal `true`; an
    # env-driven or conditional value is a different AST and is left alone.
    patterns:
      - pattern: 'trustHost: true'
      - pattern-either:
          - pattern-inside: 'NextAuth({...})'
          - pattern-inside: 'NextAuth($A, {...})'
          - pattern-inside: 'NextAuth($A, $B, {...})'
          - pattern-inside: 'Auth($A, {...})'
          - pattern-inside: 'authOptions = {...}'
          - pattern-inside: 'authConfig = {...}'
          - pattern-inside: '$X: NextAuthOptions = {...}'
          - pattern-inside: '$X: NextAuthConfig = {...}'
          - pattern-inside: '$X: AuthOptions = {...}'
    # Keep the rule off test, example, and dev-playground trees, where demo
    # configs intentionally use these shapes; it still fires on its own fixtures
    # under rules/tests/fixtures/ (whose path has no such segment).
    paths:
      exclude:
        - "**/test/**"
        - "**/__tests__/**"
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/example/**"
        - "**/examples/**"
        - "**/demo/**"
        - "**/dev/**"
    metadata:
      oauthlint-rule-id: AUTH-NEXTAUTH-006
      oauthlint-doc-url: https://oauthlint.dev/rules/nextauth-trust-host-enabled
      category: security
      cwe: CWE-350
      owasp: A05:2021
      llm-prevalence: MEDIUM
      technology:
        - next-auth
      references:
        - https://authjs.dev/reference/core#trusthost
        - https://cwe.mitre.org/data/definitions/350.html
