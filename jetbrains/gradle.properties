# Plugin coordinates and versions consumed by build.gradle.kts.
pluginGroup=dev.oauthlint
pluginName=OAuthLint
pluginVersion=0.1.0

# Version of the bundled OAuthLint rule pack (mirrors rules/package.json).
# Used as the cache-dir key when the pack is extracted from the plugin jar.
rulesVersion=0.7.0

# Lower bound of supported IntelliJ Platform builds. 242 == 2024.2.
# untilBuild is left open (243.*) so newer 2024.3 builds keep loading the plugin.
pluginSinceBuild=242
pluginUntilBuild=243.*

# Target IDE the plugin is compiled and test-run against.
platformType=IC
platformVersion=2024.2

# Gradle / JVM ergonomics.
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.configuration-cache=false
org.gradle.caching=true
kotlin.stdlib.default.dependency=false
