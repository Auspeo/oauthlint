name: OAuthLint
description: Catch OAuth/OIDC/JWT anti-patterns AI coding tools systematically produce.
author: Maurice Anney <webofboss@gmail.com>
branding:
  icon: shield
  color: purple

inputs:
  path:
    description: Path to scan (defaults to the repo root).
    required: false
    default: '.'
  severity:
    description: 'Filter findings: only emit those at this severity or above (INFO|LOW|MEDIUM|HIGH|CRITICAL).'
    required: false
    default: ''
  fail-on:
    description: 'Fail the job if any finding has this severity or above. Use "off" to never fail.'
    required: false
    default: 'HIGH'
  json:
    description: 'When true, emit JSON in addition to pretty output.'
    required: false
    default: 'false'
  output:
    description: 'Path to write the JSON report (only used when json=true).'
    required: false
    default: 'oauthlint-report.json'
  sarif:
    description: 'When true, emit a SARIF 2.1.0 report for GitHub Code Scanning.'
    required: false
    default: 'false'
  sarif-file:
    description: 'Path to write the SARIF report (only used when sarif=true).'
    required: false
    default: 'oauthlint.sarif'
  annotations:
    description: 'Emit inline PR annotations + a Markdown job summary for each finding. Set to "false" to opt out.'
    required: false
    default: 'true'

outputs:
  findings:
    description: Number of findings (after severity filtering).
    value: ${{ steps.run.outputs.findings }}
  highest-severity:
    description: Highest severity in the report.
    value: ${{ steps.run.outputs.highest-severity }}
  sarif-file:
    description: Path to the generated SARIF report (only set when sarif=true).
    value: ${{ steps.run.outputs.sarif-file }}

runs:
  using: docker
  image: Dockerfile
  args:
    - ${{ inputs.path }}
    - ${{ inputs.severity }}
    - ${{ inputs.fail-on }}
    - ${{ inputs.json }}
    - ${{ inputs.output }}
    - ${{ inputs.sarif }}
    - ${{ inputs.sarif-file }}
    - ${{ inputs.annotations }}
